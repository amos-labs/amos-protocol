version: '3.8'

# AMOS Harness - Per-Customer Deployment
# ========================================
# This Docker Compose file runs a single customer harness instance.
# Each customer gets their own isolated stack with dedicated postgres/redis.
#
# Architecture:
# - amos-harness: Customer-specific AI business OS (port 3000)
# - postgres: Customer database with pgvector
# - redis: Customer cache and job queue

services:
  # PostgreSQL 16 with pgvector extension
  postgres:
    image: pgvector/pgvector:pg16
    container_name: amos_harness_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-amos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-amos_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-amos_harness}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-amos}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - harness_network

  # Redis 7 for caching and job queues
  redis:
    image: redis:7-alpine
    container_name: amos_harness_redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - harness_network

  # AMOS Harness - Customer AI Business OS
  harness:
    build:
      context: ../..
      dockerfile: docker/harness/Dockerfile
    container_name: amos_harness
    ports:
      - "${HARNESS_PORT:-3000}:3000"
    environment:
      # Environment
      AMOS__ENVIRONMENT: ${ENVIRONMENT:-production}

      # Server
      AMOS__SERVER__HOST: 0.0.0.0
      AMOS__SERVER__PORT: 3000

      # Database
      AMOS__DATABASE__URL: postgresql://${POSTGRES_USER:-amos}:${POSTGRES_PASSWORD:-amos_dev_password}@postgres:5432/${POSTGRES_DB:-amos_harness}
      AMOS__DATABASE__MAX_CONNECTIONS: ${DB_POOL_SIZE:-40}

      # Redis
      AMOS__REDIS__URL: redis://:${REDIS_PASSWORD:-}@redis:6379/0
      AMOS__REDIS__POOL_SIZE: ${REDIS_POOL_SIZE:-10}

      # Customer configuration
      AMOS__CUSTOMER__ID: ${CUSTOMER_ID}
      AMOS__CUSTOMER__NAME: ${CUSTOMER_NAME}

      # Platform connection (for billing/token operations)
      AMOS__PLATFORM__URL: ${PLATFORM_URL:-https://platform.amos.io}
      AMOS__PLATFORM__API_KEY: ${PLATFORM_API_KEY}

      # AWS Bedrock (for AI models)
      AMOS__BEDROCK__AWS_REGION: ${AWS_REGION:-us-west-2}
      AMOS__BEDROCK__AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AMOS__BEDROCK__AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AMOS__BEDROCK__DEFAULT_MODEL: ${DEFAULT_MODEL:-anthropic.claude-3-5-sonnet-20241022-v2:0}

      # Agent configuration
      AMOS__AGENT__MAX_ITERATIONS: ${AGENT_MAX_ITERATIONS:-50}
      AMOS__AGENT__MAX_CONTEXT_TOKENS: ${AGENT_MAX_CONTEXT_TOKENS:-100000}
      AMOS__AGENT__TOKEN_BUDGET: ${AGENT_TOKEN_BUDGET:-200000}

      # Observability
      RUST_LOG: ${RUST_LOG:-info,amos_harness=debug}
      RUST_BACKTRACE: ${RUST_BACKTRACE:-1}
    volumes:
      - harness_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - harness_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  harness_data:
    driver: local

networks:
  harness_network:
    driver: bridge

# Environment Variables
# =====================
# Required:
# - CUSTOMER_ID: Unique customer identifier (UUID)
# - CUSTOMER_NAME: Customer display name
# - PLATFORM_API_KEY: API key for platform communication
# - AWS_ACCESS_KEY_ID: AWS credentials for Bedrock
# - AWS_SECRET_ACCESS_KEY: AWS secret key
#
# Optional (defaults shown):
# - ENVIRONMENT=production
# - HARNESS_PORT=3000
# - POSTGRES_USER=amos
# - POSTGRES_PASSWORD=amos_dev_password
# - POSTGRES_DB=amos_harness
# - POSTGRES_PORT=5432
# - REDIS_PORT=6379
# - REDIS_PASSWORD= (empty, no auth in dev)
# - PLATFORM_URL=https://platform.amos.io
# - AWS_REGION=us-west-2
# - DB_POOL_SIZE=40
# - REDIS_POOL_SIZE=10
#
# Usage:
# 1. Copy .env.example to .env
# 2. Set required environment variables
# 3. Run: docker compose up -d
# 4. Check logs: docker compose logs -f harness
# 5. Health check: curl http://localhost:3000/health
