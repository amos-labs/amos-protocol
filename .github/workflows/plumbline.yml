# Plumbline — proof-carrying gate on every PR.
#
# PR-only by design: this job never runs on main pushes, so it can never block
# a merge/deploy path. It verifies the PR's receipt: shape + diff-hash integrity
# always; full semantic review + PR comment when ANTHROPIC_API_KEY is configured
# as a repo secret (this repo has it set), otherwise it falls back to
# `plumb check`.
#
# Follow-up (tracked): pin to a released tag (plumbline@v1) instead of #master.
name: Plumbline Gate

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  checks: read

jobs:
  plumbline:
    name: Plumbline Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for base diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # The gate's ci-evidence check reads the required CI check's conclusion.
      # Plumbline finishes in seconds but the Rust CI takes minutes, so without
      # this wait the gate races ahead and reports ci-evidence FAIL
      # (status=in_progress) on every first run. Poll the required check to a
      # terminal state first so the gate evaluates real evidence exactly once.
      - name: Wait for required CI check (Lint & Unit Tests)
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          for i in $(seq 1 60); do
            line=$(gh api "repos/${{ github.repository }}/commits/$SHA/check-runs" \
              --jq '.check_runs[] | select(.name=="Lint & Unit Tests") | "\(.status)/\(.conclusion)"' 2>/dev/null | head -1 || true)
            echo "attempt $i: Lint & Unit Tests = ${line:-<not-reported-yet>}"
            case "$line" in
              completed/*) echo "required check reached terminal state"; exit 0;;
            esac
            sleep 20
          done
          echo "::warning::Lint & Unit Tests did not reach a terminal state in time; the gate will evaluate current evidence."

      - name: Detect semantic-review key
        id: key
        run: echo "present=${{ secrets.ANTHROPIC_API_KEY != '' }}" >> "$GITHUB_OUTPUT"

      - name: Plumbline gate — full (shape + semantic review + PR comment)
        if: steps.key.outputs.present == 'true'
        uses: amos-labs/plumbline@v0.3.0
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          github-token: ${{ github.token }}

      - name: Plumbline gate — shape + diff integrity (no review key configured)
        if: steps.key.outputs.present != 'true'
        run: npx -y github:amos-labs/plumbline#master check
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
