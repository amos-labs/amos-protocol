name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      # Doc-only commits don't need a full Rust build. Touch any code path
      # alongside the doc to force a build.
      - 'docs/**'
      - '*.md'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.gitignore'
      - 'LICENSE'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # amos-relay uses runtime sqlx (no compile-checked query! macros), so no
  # live DB or .sqlx cache is needed — but set offline mode defensively so a
  # future query! never turns CI red without a DATABASE_URL.
  SQLX_OFFLINE: true

jobs:
  # ============================================================================
  # GATE 1: Format, Lint, Unit Tests
  #
  # Scope: the cargo workspace defined in the root Cargo.toml —
  # amos-core, amos-relay, amos-agent, amos-oracle.
  #
  # The Anchor on-chain programs under amos-solana/ are a SEPARATE cargo
  # workspace, deliberately excluded from the root workspace, and only build
  # under the Solana BPF toolchain via `anchor build`. They are covered by the
  # dedicated `anchor-build` job below rather than by `cargo fmt/clippy/test`
  # here — running plain clippy/test against them would fail on the missing
  # solana-program BPF target, not on any real defect.
  # ============================================================================
  check:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Check code formatting
        run: cargo fmt --all -- --check

      - name: Cargo check
        run: cargo check --all-targets

      - name: Run Clippy (warnings as errors)
        run: cargo clippy --all-targets -- -D warnings

      - name: Run unit tests
        run: cargo test --lib

      - name: Run doc tests
        run: cargo test --doc

  # ============================================================================
  # GATE 2: Anchor build — on-chain programs (treasury, governance, bounty)
  #
  # The amos-solana/ programs live outside the cargo workspace and require the
  # Solana + Anchor toolchains (BPF target). This job installs both and runs
  # `anchor build` so a change that breaks the on-chain programs is caught,
  # without dragging the BPF target into the fast fmt/clippy/test path above.
  #
  # ADVISORY, NOT GATING — the protocol is public ALPHA.
  #
  # While the protocol repo is in alpha, on-chain CI is informational only: an
  # Anchor/BPF compile (or a flaky Anchor toolchain install) must never block an
  # ordinary docs/relay/agent change. This job still RUNS on every PR so we can
  # see on-chain breakage, but it does not gate merges in two ways:
  #   1. `continue-on-error: true` — a failure here never fails the CI workflow.
  #   2. This check ("Anchor Build (on-chain programs)") is deliberately absent
  #      from `.plumbline/policy.json` -> `ci_evidence_checks`, so the Plumbline
  #      gate never requires it to certify. Only "Lint & Unit Tests" gates.
  #
  # Program IDs are frozen (mainnet/devnet unchanged), which is why alpha =
  # advisory on-chain. Flip `continue-on-error` off AND add this check to
  # `ci_evidence_checks` once the on-chain programs re-enter active change and
  # the alpha posture moves to "active".
  # ============================================================================
  anchor-build:
    name: Anchor Build (on-chain programs)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: amos-solana
          cache-on-failure: true

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Install Anchor (AVM — version pinned by amos-solana/Anchor.toml)
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --locked --force
          # `anchor build` resolves the version from amos-solana/Anchor.toml's
          # [toolchain] anchor_version, so install exactly that to avoid a
          # "not installed" failure.
          ANCHOR_VERSION=$(grep -E '^anchor_version' amos-solana/Anchor.toml | sed -E 's/.*"([^"]+)".*/\1/')
          echo "Installing Anchor $ANCHOR_VERSION"
          avm install "$ANCHOR_VERSION"
          avm use "$ANCHOR_VERSION"

      - name: Anchor build
        working-directory: amos-solana
        run: anchor build
