name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  SQLX_OFFLINE: true
  AWS_REGION: us-east-1
  ECR_REGISTRY: 637423327454.dkr.ecr.us-east-1.amazonaws.com

jobs:
  # ============================================================================
  # GATE 1: Format, Lint, Unit Tests, Security Audit
  # ============================================================================
  check:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Check code formatting
        run: cargo fmt --all -- --check

      - name: Cargo check
        run: cargo check --all-targets

      - name: Run Clippy (warnings as errors)
        run: cargo clippy --all-targets -- -D warnings

      - name: Run unit tests
        run: cargo test --lib

      - name: Run doc tests
        run: cargo test --doc

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Security audit dependencies
        run: cargo audit
        continue-on-error: true  # Advisory-only for now

  # ============================================================================
  # GATE 1.5: Release Gate — critical-path invariants that MUST block deploys
  #
  # Narrow, fast suite that guards against the regression classes that have
  # actually hit prod: bad Bedrock model IDs, malformed tool schemas, pricing
  # drift. Runs the same tests as the `check` job but isolated here so a
  # failure blocks image builds — unlike clippy/audit which stay advisory.
  # ============================================================================
  release-gate:
    name: Release Gate — Catalog + Schema Invariants
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Model catalog + pricing invariants
        run: cargo test --lib -p amos-harness routes::settings::tests

      - name: Tool schema invariants
        run: cargo test --lib -p amos-harness schema_tests

      - name: Bedrock envelope contract
        # Snapshot-tests the JSON body our Bedrock request builder produces.
        # Guards against the tool-spec wrapping regressions that have hit
        # prod twice and against inferenceConfig drift. Pure Rust, no infra.
        run: cargo test --test bedrock_envelope -p amos-agent

  # ============================================================================
  # GATE 1.55: Integration Smoke — core app flows against a real Postgres
  #
  # Spins up pgvector/pgvector:pg16, applies every harness migration, and
  # exercises the flows customers hit first: landing-page creation (the exact
  # flow that broke for Jana), multi-page sites, collection/record CRUD with
  # field-type validation. Catches broken migrations, broken schemas, and any
  # regression in the SiteEngine / SchemaEngine that static tests can't see.
  # Runs on every PR + push.
  # ============================================================================
  integration-smoke:
    name: Integration Smoke — Core App Flows
    runs-on: ubuntu-latest
    needs: release-gate

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: amos_harness_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgres://postgres:test@localhost:5432/amos_harness_test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install postgres client
        run: sudo apt-get install -y postgresql-client

      - name: Enable pgvector extension
        run: PGPASSWORD=test psql -h localhost -U postgres -d amos_harness_test -c 'CREATE EXTENSION IF NOT EXISTS vector;'

      - name: Run core-flow smoke tests
        run: cargo test --test smoke_flows -p amos-harness -- --test-threads=1

  # ============================================================================
  # GATE 1.57: HTTP Integration — real Axum router, real Postgres, real Redis
  #
  # Phase 1a of the test harness plan. Drives every protected/public route
  # through the same middleware stack production uses (auth, rate limiting,
  # CORS, compression). Catches routing regressions, auth bypasses, middleware
  # misconfiguration, and JSON serde drift that unit tests can't see.
  # No Bedrock, no agent sidecar, no LLM — so PR throughput stays fast.
  # ============================================================================
  http-integration:
    name: HTTP Integration — Router + Postgres + Redis
    runs-on: ubuntu-latest
    needs: release-gate

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: amos_harness_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgres://postgres:test@localhost:5432/amos_harness_test
      AMOS__REDIS__URL: redis://localhost:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install postgres client
        run: sudo apt-get install -y postgresql-client

      - name: Enable pgvector extension
        run: PGPASSWORD=test psql -h localhost -U postgres -d amos_harness_test -c 'CREATE EXTENSION IF NOT EXISTS vector;'

      - name: Run HTTP integration tests
        run: cargo test --test http_integration -p amos-harness -- --test-threads=1

  # ============================================================================
  # GATE 1.6: Live Model Probe — actually call Converse on every cataloged model
  #
  # Only runs on push to main (needs AWS OIDC, which the trust policy on the
  # `claude_github` role is scoped to `refs/heads/main`). Uses `print-model-catalog`
  # as the single source of truth for which model IDs to probe, so the dropdown
  # and the probe can never drift apart.
  #
  # Catches the regression classes the static tests can't see: Marketplace
  # subscription gaps, IAM permission drift, inference-profile renames, region
  # availability changes. Blocks the image build on any failure.
  # ============================================================================
  live-model-probe:
    name: Live Model Probe — Every Cataloged Model Responds
    runs-on: ubuntu-latest
    needs: release-gate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::637423327454:role/claude_github
          aws-region: us-east-1

      - name: Probe every cataloged model with a tiny Converse call
        run: |
          set -euo pipefail
          MODELS=$(cargo run --quiet --bin print-model-catalog -p amos-harness)
          fail=0
          while IFS= read -r m; do
            [ -z "$m" ] && continue
            echo "::group::Probe $m"
            if out=$(aws bedrock-runtime converse \
                --model-id "$m" \
                --messages '[{"role":"user","content":[{"text":"hi"}]}]' \
                --inference-config maxTokens=3 \
                --region us-east-1 2>&1); then
              tokens=$(echo "$out" | grep -oE '"outputTokens":\s*[0-9]+' | head -1 || true)
              echo "OK — $tokens"
            else
              echo "FAIL"
              echo "$out"
              fail=1
            fi
            echo "::endgroup::"
          done <<< "$MODELS"
          if [ "$fail" -ne 0 ]; then
            echo "::error::One or more cataloged models failed to respond. Release blocked."
            exit 1
          fi
          echo "All cataloged models responded successfully."

  # ============================================================================
  # GATE 1.7: Tool Selection Probe — agent picks the right tool for the job
  #
  # Phase 2.5 of the plan. Calls Haiku via real Bedrock with the harness's
  # real tool schemas and asserts the model picks the expected tool for a
  # canonical prompt. Catches the regression class that broke Jana's landing
  # pages on 2026-04-19: a tool-description change made the agent pick the
  # wrong tool. Static schema tests can't see this; the golden bounty harness
  # (Phase 4) is months out.
  #
  # Main-push-only — real Bedrock calls cost money, and PR throughput
  # shouldn't depend on LLM availability. Reuses the `claude_github` OIDC
  # role from live-model-probe.
  # ============================================================================
  tool-selection-probe:
    name: Tool Selection — Agent Picks the Right Tool
    runs-on: ubuntu-latest
    needs: release-gate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::637423327454:role/claude_github
          aws-region: us-east-1

      - name: Probe tool selection with Haiku
        run: cargo test --test tool_selection_live -p amos-harness -- --ignored --test-threads=1

  # ============================================================================
  # GATE 2: Build Docker images and push to ECR
  #
  # Depends on `release-gate` and `live-model-probe` — neither a malformed
  # catalog nor a Bedrock access gap can reach a customer harness.
  # `check` (clippy/audit/full test suite) stays
  # advisory and does not block deploys.
  # ============================================================================
  build-images:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [release-gate, integration-smoke, http-integration, live-model-probe, tool-selection-probe]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::637423327454:role/github-actions-amos-deploy
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image tag
        id: vars
        run: |
          echo "IMAGE_TAG=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "SHORT_SHA=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Build and push amos-harness
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/harness/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/amos-harness:${{ steps.vars.outputs.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/amos-harness:latest
          cache-from: type=gha,scope=harness
          cache-to: type=gha,mode=max,scope=harness

      - name: Build and push amos-agent
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/agent/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/amos-agent:${{ steps.vars.outputs.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/amos-agent:latest
          cache-from: type=gha,scope=agent
          cache-to: type=gha,mode=max,scope=agent

      - name: Build and push amos-relay
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/relay/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/amos-relay:${{ steps.vars.outputs.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/amos-relay:latest
          cache-from: type=gha,scope=relay
          cache-to: type=gha,mode=max,scope=relay

      - name: Register release with platform
        run: |
          curl -sf -X POST "https://app.amoslabs.com/api/v1/releases" \
            -H "Authorization: Bearer ${{ secrets.RELEASE_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"version\":\"${{ steps.vars.outputs.IMAGE_TAG }}\",\"commit_sha\":\"${GITHUB_SHA}\",\"harness_image\":\"${{ env.ECR_REGISTRY }}/amos-harness:${{ steps.vars.outputs.IMAGE_TAG }}\",\"agent_image\":\"${{ env.ECR_REGISTRY }}/amos-agent:${{ steps.vars.outputs.IMAGE_TAG }}\"}"
        continue-on-error: true  # Don't fail the build if platform is temporarily down

      - name: Build summary
        run: |
          echo "### Images pushed successfully :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | Tag |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-----|" >> "$GITHUB_STEP_SUMMARY"
          echo "| amos-harness | \`${{ steps.vars.outputs.IMAGE_TAG }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| amos-agent | \`${{ steps.vars.outputs.IMAGE_TAG }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| amos-relay | \`${{ steps.vars.outputs.IMAGE_TAG }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "New harnesses will use this image. Existing harnesses can pull updates via the dashboard." >> "$GITHUB_STEP_SUMMARY"
